<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Detailed technical specifications and parameters for AEC industrial packaging films and materials." />
  <title>Product Details | AEC GROUP</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="products.js"></script>
  <script src="nav.js"></script>
  <style>
    .detail-sec { padding: 60px 0 100px; background: var(--gray-50); }
    .detail-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; background: white; border-radius: var(--radius-lg); padding: 48px; border: 1px solid var(--gray-200); box-shadow: var(--shadow-sm); }
    
    .detail-img-wrap { background: var(--gray-50); border-radius: var(--radius-md); border: 1px solid var(--gray-200); overflow: hidden; display: flex; align-items: center; justify-content: center; height: 400px; }
    .detail-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
    
    .detail-info { display: flex; flex-direction: column; }
    .detail-category { font-size: .85rem; color: var(--accent); font-weight: 600; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .detail-title { font-size: 1.8rem; font-weight: 800; color: var(--primary); margin-bottom: 16px; line-height: 1.3; }
    .detail-code { font-size: .9rem; background: var(--gray-100); color: var(--gray-700); padding: 4px 12px; border-radius: 4px; width: fit-content; font-weight: 600; margin-bottom: 24px; font-family: 'Inter', sans-serif; }
    
    .detail-desc-title { font-size: 1rem; font-weight: 700; color: var(--primary); margin-bottom: 12px; border-bottom: 2px solid var(--gray-100); padding-bottom: 6px; }
    .detail-desc { font-size: .92rem; color: var(--gray-500); line-height: 1.7; margin-bottom: 30px; }
    
    /* Technical specs table */
    .specs-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
    .specs-table tr { border-bottom: 1px solid var(--gray-100); }
    .specs-table tr:last-child { border-bottom: none; }
    .specs-table td { padding: 12px 16px; font-size: .9rem; }
    .specs-table td.label { font-weight: 600; color: var(--primary); width: 35%; background: var(--gray-50); }
    .specs-table td.val { color: var(--gray-700); }

    .inquiry-card { background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: var(--radius-md); padding: 24px; display: flex; align-items: center; justify-content: space-between; gap: 20px; }
    .inquiry-text h4 { font-size: 1rem; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
    .inquiry-text p { font-size: .82rem; color: var(--gray-500); }

    @media (max-width: 768px) {
      .detail-layout { grid-template-columns: 1fr; padding: 24px; }
      .detail-img-wrap { height: 280px; }
    }
  </style>
</head>
<body>

<div id="header-container"></div>

<section class="detail-sec">
  <div class="container">
    <!-- Back to catalog -->
    <a href="products.html" style="display: inline-flex; align-items: center; gap: 8px; color: var(--accent); font-weight: 600; margin-bottom: 24px; font-size: .9rem">
      <i class="fas fa-arrow-left"></i> 
      <span class="lang-en">Back to Product Catalog</span>
      <span class="lang-zh" style="display:none">返回产品目录</span>
    </a>

    <div class="detail-layout" id="detailLayout">
      <!-- Dynamically populated -->
    </div>
  </div>
</section>

<div id="footer-container"></div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const params = new URLSearchParams(window.location.search);
    const productId = params.get('id');
    
    if (!productId) {
      showError();
      return;
    }
    
    const product = window.AEC_PRODUCTS.find(p => p.id === productId);
    if (!product) {
      showError();
      return;
    }
    
    renderProduct(product);
  });

  function showError() {
    document.getElementById("detailLayout").innerHTML = `
      <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--gray-500)">
        <i class="fas fa-exclamation-triangle" style="font-size:3rem; margin-bottom:16px; color:var(--gold)"></i>
        <p class="lang-en">Product not found. Please return to the catalog.</p>
        <p class="lang-zh" style="display:none">未找到该产品。请返回目录重新选择。</p>
        <a href="products.html" class="btn btn-accent" style="margin-top:20px">Go to Catalog</a>
      </div>
    `;
  }

  function renderProduct(p) {
    const layout = document.getElementById("detailLayout");
    if (!layout) return;

    // Build specs table HTML
    let specsHtml = "";
    if (p.specs && p.specs.length > 0) {
      p.specs.forEach(s => {
        specsHtml += `
          <tr>
            <td class="label">${s.key}</td>
            <td class="val">${s.value}</td>
          </tr>
        `;
      });
    } else {
      specsHtml = `
        <tr>
          <td class="label">Product Code</td>
          <td class="val">${p.item_code}</td>
        </tr>
        <tr>
          <td class="label">Category</td>
          <td class="val">${p.category_en}</td>
        </tr>
        <tr>
          <td class="label">Standard Specs</td>
          <td class="val">Available upon inquiry / 详情请咨询客服</td>
        </tr>
      `;
    }

    layout.innerHTML = `
      <div class="detail-img-wrap">
        <img src="${p.image}" alt="${p.name_en}" onerror="this.src='https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?w=500&auto=format&fit=crop&q=60'" />
      </div>
      <div class="detail-info">
        <div class="detail-category">
          <i class="fas ${p.category_icon || 'fa-cube'}"></i>
          <span class="lang-en">${p.category_en}</span>
          <span class="lang-zh" style="display:none">${p.category_zh}</span>
        </div>
        <h2 class="detail-title">
          <span class="lang-en">${p.name_en}</span>
          <span class="lang-zh" style="display:none">${p.name_zh}</span>
        </h2>
        <div class="detail-code">${p.item_code}</div>
        
        <h3 class="detail-desc-title">
          <span class="lang-en">Product Overview</span>
          <span class="lang-zh" style="display:none">产品概述</span>
        </h3>
        <p class="detail-desc">${p.details_en}</p>
        
        <h3 class="detail-desc-title">
          <span class="lang-en">Technical Specifications</span>
          <span class="lang-zh" style="display:none">技术参数</span>
        </h3>
        <table class="specs-table">
          ${specsHtml}
        </table>
        
        <div class="inquiry-card">
          <div class="inquiry-text">
            <h4 class="lang-en">Need Custom Specifications?</h4>
            <h4 class="lang-zh" style="display:none">需要特殊规格定制？</h4>
            <p class="lang-en">Contact Yang (Manager) for samples &amp; quotes.</p>
            <p class="lang-zh" style="display:none">立即联系杨经理，索取样品与最新报价。</p>
          </div>
          <a href="contact.html?product=${encodeURIComponent(p.item_code + ' ' + p.name_en)}" class="btn btn-accent">
            <span class="lang-en"><i class="fas fa-paper-plane"></i> Inquiry Now</span>
            <span class="lang-zh" style="display:none"><i class="fas fa-paper-plane"></i> 立即询盘</span>
          </a>
        </div>
      </div>
    `;

    // Initialize display lang
    const currentLang = localStorage.getItem("aec_lang") || "en";
    document.documentElement.setAttribute("lang", currentLang);
  }
</script>
</body>
</html>
