<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title class="lang-en">Product Center | AEC GROUP</title>
  <title class="lang-zh" style="display:none;">产品中心 | 东渐集团</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/style.css" />
  <script src="assets/nav.js"></script>
  <style>
    .products-container {
      display: flex;
      gap: 30px;
      padding: 50px 0;
    }
    .sidebar {
      width: 280px;
      flex-shrink: 0;
    }
    .sidebar-card {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-md);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      position: sticky;
      top: 100px;
    }
    .sidebar-card h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 16px;
      border-bottom: 2px solid var(--gray-100);
      padding-bottom: 8px;
    }
    .filter-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .filter-item {
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: .88rem;
      font-weight: 500;
      color: var(--gray-700);
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .filter-item:hover, .filter-item.active {
      background: rgba(26,111,206,.06);
      color: var(--accent);
    }
    .filter-item .count {
      background: var(--gray-100);
      color: var(--gray-500);
      padding: 2px 8px;
      border-radius: 20px;
      font-size: .75rem;
      font-weight: 600;
    }
    .filter-item.active .count {
      background: var(--accent);
      color: white;
    }

    .products-main {
      flex: 1;
    }
    .search-bar-wrap {
      margin-bottom: 30px;
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 14px 20px 14px 50px;
      border: 1.5px solid var(--gray-200);
      border-radius: 50px;
      font-size: .95rem;
      outline: none;
      transition: var(--transition);
      background: var(--gray-50);
    }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(26,111,206,.1);
      background: white;
    }
    .search-icon {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray-500);
      font-size: 1.1rem;
    }

    .p-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }
    .p-card {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .p-card:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow-lg);
      transform: translateY(-4px);
    }
    .p-img-box {
      height: 140px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.2rem;
      position: relative;
    }
    .p-img-box .badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(4px);
      color: white;
      padding: 3px 10px;
      border-radius: 50px;
      font-size: .72rem;
      font-weight: 600;
    }
    .p-body {
      padding: 20px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .p-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 8px;
    }
    .p-code {
      font-size: .78rem;
      color: var(--gray-500);
      font-family: 'Inter', sans-serif;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .p-desc {
      font-size: .85rem;
      color: var(--gray-500);
      line-height: 1.6;
      margin-bottom: 16px;
      flex: 1;
    }
    .p-action {
      border-top: 1px solid var(--gray-100);
      padding-top: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .btn-quote {
      color: var(--accent);
      font-size: .85rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: var(--transition);
      background: none;
      border: none;
      cursor: pointer;
    }
    .btn-quote:hover {
      color: var(--accent-light);
      gap: 10px;
    }

    @media (max-width: 900px) {
      .products-container {
        flex-direction: column;
      }
      .sidebar {
        width: 100%;
      }
      .sidebar-card {
        position: static;
      }
    }
  </style>
</head>
<body>

  <!-- HERO COMPACT -->
  <section class="hero-compact">
    <div class="container">
      <h2 class="lang-en">Product Center</h2>
      <h2 class="lang-zh" style="display:none;">产品中心</h2>
      <p class="lang-en">Discover high-specification materials, functional films, printing supplies and packaging machines.</p>
      <p class="lang-zh" style="display:none;">发现高规格材料、多功能覆膜、印刷耗材及自动化包装机械设备。</p>
    </div>
  </section>

  <!-- PRODUCTS LAYOUT -->
  <div class="container">
    <div class="products-container">
      <!-- SIDEBAR FILTERS -->
      <aside class="sidebar">
        <div class="sidebar-card">
          <h3 class="lang-en">Categories</h3>
          <h3 class="lang-zh" style="display:none;">产品分类</h3>
          <div class="filter-list" id="categoryFilters">
            <div class="filter-item active" onclick="filterCategory('all')" id="cat-all">
              <span class="lang-en">All Products</span>
              <span class="lang-zh" style="display:none;">全部产品</span>
              <span class="count" id="count-all">0</span>
            </div>
            <!-- Dynamic Category Filters Inject Here -->
          </div>
        </div>
      </aside>

      <!-- MAIN CONTENT -->
      <main class="products-main">
        <div class="search-bar-wrap">
          <i class="fas fa-search search-icon"></i>
          <input type="text" class="search-input" id="searchInput" oninput="searchProducts()" data-placeholder-en="Search products by title, spec, or code..." data-placeholder-zh="输入产品名称、规格或编号进行搜索..." placeholder="Search products by title, spec, or code..." />
        </div>

        <div class="p-grid" id="productGrid">
          <!-- Dynamic Products Inject Here -->
        </div>
      </main>
    </div>
  </div>

    let activeCategory = 'all';

    const categoryNames = {
      'bopp': { en: 'BOPP Film', zh: 'BOPP 薄膜' },
      'bopet': { en: 'BOPET Film', zh: '聚酯薄膜' },
      'tape': { en: 'Adhesive Tapes', zh: '胶粘带与胶水' },
      'coating': { en: 'Coated Films', zh: '涂布膜' },
      'specialty': { en: 'Specialty Films', zh: '特种薄膜' },
      'consumables': { en: 'Ribbons & Labels', zh: '碳带与标签' },
      'pe-pvc': { en: 'PE/PVC/POF', zh: 'PE/PVC/POF' },
      'paper': { en: 'Paper Products', zh: '纸制品' },
      'machinery': { en: 'Machinery', zh: '机械设备' },
      'solar': { en: 'Solar Panels', zh: '太阳能板' }
    };

    // Category counters
    function initFilters() {
      const counts = { all: productsData.length };
      productsData.forEach(p => {
        counts[p.category] = (counts[p.category] || 0) + 1;
      });
      
      document.getElementById('count-all').innerText = counts.all;
      
      const filterContainer = document.getElementById('categoryFilters');
      Object.keys(categoryNames).forEach(catId => {
        if (counts[catId]) {
          const item = document.createElement('div');
          item.className = 'filter-item';
          item.id = `cat-${catId}`;
          item.onclick = () => filterCategory(catId);
          item.innerHTML = `
            <span class="lang-en">${categoryNames[catId].en}</span>
            <span class="lang-zh" style="display:none;">${categoryNames[catId].zh}</span>
            <span class="count">${counts[catId]}</span>
          `;
          filterContainer.appendChild(item);
        }
      });
    }

    // Get URL parameters
    function handleUrlParams() {
      const params = new URLSearchParams(window.location.search);
      const cat = params.get('cat');
      if (cat && categoryNames[cat]) {
        filterCategory(cat);
      } else {
        renderProducts(productsData);
      }
    }

    function filterCategory(catId) {
      activeCategory = catId;
      document.querySelectorAll('.filter-item').forEach(el => el.classList.remove('active'));
      const activeEl = document.getElementById(`cat-${catId}`);
      if (activeEl) activeEl.classList.add('active');
      
      applyFilters();
    }

    function searchProducts() {
      applyFilters();
    }

    function applyFilters() {
      const query = document.getElementById('searchInput').value.toLowerCase().trim();
      let filtered = productsData;
      
      if (activeCategory !== 'all') {
        filtered = filtered.filter(p => p.category === activeCategory);
      }
      
      if (query) {
        filtered = filtered.filter(p => {
          return p.title_en.toLowerCase().includes(query) || 
                 p.title_cn.toLowerCase().includes(query) || 
                 p.number.toLowerCase().includes(query) ||
                 p.desc_en.toLowerCase().includes(query) ||
                 p.desc_cn.toLowerCase().includes(query);
        });
      }
      
      renderProducts(filtered);
    }

    function renderProducts(list) {
      const grid = document.getElementById('productGrid');
      grid.innerHTML = '';
      
      if (list.length === 0) {
        grid.innerHTML = `
          <div style="grid-column: 1/-1; text-align: center; padding: 50px; color: var(--gray-500)">
            <p class="lang-en"><i class="fas fa-search" style="font-size:2rem; margin-bottom:10px"></i><br>No products match your filters.</p>
            <p class="lang-zh" style="display:none;"><i class="fas fa-search" style="font-size:2rem; margin-bottom:10px"></i><br>未找到符合条件的商品。</p>
          </div>
        `;
        return;
      }
      
      list.forEach(p => {
        const card = document.createElement('div');
        card.className = 'p-card';
        
        let emoji = '🎞️';
        if (p.category === 'machinery') emoji = '⚙️';
        if (p.category === 'solar') emoji = '☀️';
        if (p.category === 'consumables') emoji = '🖨️';
        if (p.category === 'tape') emoji = '🏷️';
        if (p.category === 'paper') emoji = '📄';
        
        card.innerHTML = `
          <div class="p-img-box">
            <span>${emoji}</span>
            <span class="badge lang-en">${p.category_en}</span>
            <span class="badge lang-zh" style="display:none;">${p.category_cn}</span>
          </div>
          <div class="p-body">
            <h3 class="p-title lang-en">${p.title_en}</h3>
            <h3 class="p-title lang-zh" style="display:none;">${p.title_cn}</h3>
            <div class="p-code"><i class="fas fa-barcode"></i> Code: ${p.number}</div>
            <p class="p-desc lang-en">${p.desc_en}</p>
            <p class="p-desc lang-zh" style="display:none;">${p.desc_cn}</p>
            <div class="p-action">
              <button class="btn-quote" onclick="askQuote('${p.title_en}', '${p.number}')">
                <span class="lang-en">Request Quote <i class="fas fa-arrow-right"></i></span>
                <span class="lang-zh" style="display:none;">获取报价 <i class="fas fa-arrow-right"></i></span>
              </button>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
      
      // Keep current language state
      setLanguage(currentLang);
    }

    function askQuote(title, code) {
      const subject = encodeURIComponent(`Product Inquiry - ${title} (Code: ${code})`);
      const body = encodeURIComponent(`Hello AEC GROUP Sales Team,

I am interested in your product:
Product: ${title}
Code: ${code}

Please provide specifications and FOB pricing details.`);
      window.location.href = `mailto:sale@boppfilmsale.com?subject=${subject}&body=${body}`;
    }

    // Init
    initFilters();
    handleUrlParams();
